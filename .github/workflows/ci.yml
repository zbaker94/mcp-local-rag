name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  static-checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
      with:
        version: 10

    - name: Install dependencies
      run: pnpm install

    - name: Lint check
      run: pnpm run lint

    - name: Format check
      run: pnpm run format:check

    - name: Type check
      run: pnpm run build

    - name: Check production dependencies
      run: npx report-missing-dependencies

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      # Node honours TZ on every platform, so this replaces the Linux-only
      # `timedatectl` step and keeps test behaviour consistent across runners.
      TZ: Asia/Tokyo

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
      with:
        version: 10

    - name: Install dependencies
      run: pnpm install

    # The integration tests use Xenova/all-MiniLM-L6-v2 via @huggingface/transformers,
    # which is downloaded on first use (~90MB).
    - name: Restore HuggingFace model cache
      id: hf-cache-restore
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: tmp/models
        key: hf-model-${{ runner.os }}-Xenova-all-MiniLM-L6-v2

    - name: Run tests
      run: pnpm test

    - name: Save HuggingFace model cache
      if: steps.hf-cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: tmp/models
        key: ${{ steps.hf-cache-restore.outputs.cache-primary-key }}

  webgpu-main-path:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      TZ: Asia/Tokyo

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version-file: '.nvmrc'

    - name: Install pnpm
      uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
      with:
        version: 10

    - name: Install dependencies
      run: pnpm install

    - name: Install Vulkan SDK and Software Rasterizer
      uses: jakoch/install-vulkan-sdk-action@3c53c378c9bfbb2ea122a1cc164a837d4004c871 # v1.5.2
      with:
        install_runtime: true
        install_swiftshader: ${{ runner.os == 'Windows' }}
        install_lavapipe: ${{ runner.os == 'Linux' }}

    - name: Install Vulkan Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libvulkan1 vulkan-tools libwayland-client0 mesa-vulkan-drivers

    - name: Verify Vulkan
      run: vulkaninfo --summary

    - name: Restore HuggingFace model cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: tmp/models
        key: hf-model-${{ runner.os }}-Xenova-all-MiniLM-L6-v2

    - name: Run WebGPU main path tests
      env:
        # WebGPU benefits from lower-precision model weights; fp32 is kept as
        # the default for normal CPU tests.
        RAG_DTYPE: fp16
        # Direct Dawn to use Vulkan (rather than D3D12) on Windows, so
        # SwiftShader/Lavapipe can serve as the adapter.
        WGPU_BACKEND: vulkan
        VK_ICD_FILENAMES: ${{ runner.os == 'Windows' && 'C:\SwiftShader\vk_swiftshader_icd.json' || '/usr/share/vulkan/icd.d/lvp_icd.json' }}
      run: pnpm run test:webgpu:main-path

  # Stable aggregate check. The `main` ruleset requires a status named `ci`,
  # so this job keeps that name regardless of the test matrix dimensions.
  ci:
    needs: [static-checks, test, webgpu-main-path]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Verify the test matrix succeeded
      if: needs.static-checks.result != 'success' || needs.test.result != 'success' || needs.webgpu-main-path.result != 'success'
      run: exit 1
